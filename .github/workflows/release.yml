name: Release

# Build installers for macOS, Windows, and Linux and publish them to a
# GitHub Release. Trigger by pushing a version tag (e.g. `git tag v0.1.0 &&
# git push origin v0.1.0`), or run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev patchelf libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libsecret-1-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Meyatu Code ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform from the assets below.

            Binaries are unsigned — your OS may warn on first launch
            (macOS: right-click → Open; Windows: "More info" → "Run anyway").

            After installing, open Settings and add an API key for a provider
            (OpenAI-compatible / Anthropic / Gemini) to start.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
